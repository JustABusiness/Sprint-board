function badgeClass(team){
  return {BE:'b-be',FE:'b-fe',DevOps:'b-dv',Marketing:'b-mk'}[team]||'b-all';
}
function badgeLabel(team){
  return {BE:'Backend',FE:'Frontend',DevOps:'DevOps',Marketing:'Marketing'}[team]||team;
}

let currentFilter = 'all';

function filter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderBoard();
}

function taskVisible(task){
  if(currentFilter==='all') return true;
  if(currentFilter==='P1') return task.pri==='P1';
  if(currentFilter==='P2') return task.pri==='P2';
  return task.team===currentFilter;
}

function renderBoard(){
  const el = document.getElementById('board-content');
  let html = '';
  let counts = {total:0,BE:0,FE:0,other:0};

  SPRINTS.forEach(sprint=>{
    const visible = sprint.tasks.filter(taskVisible);
    if(visible.length===0) return;
    counts.total += visible.length;
    visible.forEach(t=>{
      if(t.team==='BE') counts.BE++;
      else if(t.team==='FE') counts.FE++;
      else counts.other++;
    });
    html += `<div class="sprint">
      <div class="sprint-header">
        <div class="sprint-title">${sprint.title}</div>
        <div class="sprint-sub">${sprint.sub}</div>
        <div class="sprint-count">${visible.length} tasks</div>
      </div>
      <div class="tasks">`;
    visible.forEach(task=>{
      html += `<div class="task" onclick="sendPrompt('Tell me more about ${task.id}: ${task.title} and how to implement it for V-AELTIS')">
        <div class="task-id">${task.id}</div>
        <div>
          <div class="task-title">${task.title}</div>
          <div class="task-desc">${task.desc}</div>
        </div>
        <span class="badge ${badgeClass(task.team)}">${badgeLabel(task.team)}</span>
        <div style="display:flex;gap:4px;align-items:center">
          <span class="size ${task.size}">${task.size}</span>
          <span class="pri ${task.pri.toLowerCase()}">${task.pri}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  if(html==='') html = '<div class="empty">Không có task nào phù hợp với filter này</div>';
  el.innerHTML = html;

  document.getElementById('s-total').textContent = counts.total;
  document.getElementById('s-be').textContent = counts.BE;
  document.getElementById('s-fe').textContent = counts.FE;
  document.getElementById('s-dv').textContent = counts.other;
}

renderBoard();
</script>
